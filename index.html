<!-- index.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Medical Test App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <header>
    <h1>🩺 Medical Test App</h1>

    <div class="controls">
      <button id="startBtn">Начать тест</button>
      <button id="mistakesBtn">Только ошибки</button>
      <button id="resetStatsBtn">Сбросить статистику</button>
    </div>

    <div class="stats">
      <span id="progress">0 / 0</span>
      <span id="score">Правильно: 0</span>
    </div>
  </header>

  <main id="app">
    <div class="welcome">
      <h2>Готов к тестированию?</h2>
      <p>Нажми "Начать тест"</p>
    </div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
